name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  build:
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            executable: whiscord
            triple: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: bun-linux-arm64
            executable: whiscord
            triple: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: bun-windows-x64
            executable: whiscord.exe
            triple: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: bun-windows-arm64
            executable: whiscord.exe
            triple: aarch64-pc-windows-msvc
          - os: macos-latest
            target: bun-darwin-x64
            executable: whiscord
            triple: x86_64-apple-darwin
          - os: macos-latest
            target: bun-darwin-arm64
            executable: whiscord
            triple: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable
        run: bun run build:exe -- --target ${{ matrix.target }} --outfile dist/${{ matrix.executable }}

      - name: Package executable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item "dist/${{ matrix.executable }}" "package/${{ matrix.executable }}"
          Compress-Archive -Path "package/${{ matrix.executable }}" -DestinationPath "whiscord-${{ matrix.triple }}.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: whiscord-${{ matrix.triple }}
          path: whiscord-${{ matrix.triple }}.zip
