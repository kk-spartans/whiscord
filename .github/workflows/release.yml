name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run fmt:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            executable: whiscord
            triple: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            executable: whiscord
            triple: aarch64-unknown-linux-gnu
          - os: windows-latest
            executable: whiscord.exe
            triple: x86_64-pc-windows-msvc
          - os: windows-11-arm
            executable: whiscord.exe
            triple: aarch64-pc-windows-msvc
          - os: macos-15-intel
            executable: whiscord
            triple: x86_64-apple-darwin
          - os: macos-latest
            executable: whiscord
            triple: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25.9.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build executable
        run: pnpm run build:exe -- --outfile dist/${{ matrix.executable }}

      - name: Package executable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item "dist/${{ matrix.executable }}" "package/${{ matrix.executable }}"
          Compress-Archive -Path "package/${{ matrix.executable }}" -DestinationPath "whiscord-${{ matrix.triple }}.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: whiscord-${{ matrix.triple }}
          path: whiscord-${{ matrix.triple }}.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
